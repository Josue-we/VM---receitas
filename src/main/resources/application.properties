spring.application.name=receitas

# ── Banco de dados ───────────────────────────────────────────────────────────
# Valores padrão servem para rodar local, na sua máquina, fora de container.
# Em Homologação/Produção, o docker-compose sobrescreve via variável de ambiente.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/receitasdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ── JPA ───────────────────────────────────────────────────────────────────────
# validate (não mais update): quem cria/evolui o schema agora é o Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway (versionamento do banco de dados) ─────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Servidor ──────────────────────────────────────────────────────────────────
server.port=8080

# ── E-mail (nunca hardcode usuário/senha aqui; use variáveis de ambiente) ────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.email.destinatario=${APP_EMAIL_DESTINATARIO:admin@receitas.com}
app.email.remetente=${APP_EMAIL_REMETENTE:noreply@receitas.com}
