<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo}">Receita</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f4f6f9; }
        .form-card { max-width: 680px; margin: 0 auto; border: none;
                     box-shadow: 0 4px 16px rgba(0,0,0,.1); border-radius: 14px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="bi bi-book-half me-2"></i>Receitas</span>
        <a th:href="@{/receitas}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Voltar
        </a>
    </div>
</nav>

<div class="container py-3">
    <div class="card form-card p-4">

        <h5 class="mb-4 fw-bold" th:text="${titulo}">Receita</h5>

        <form th:action="@{/receitas/salvar}" th:object="${receita}" method="post">

            <!-- ID oculto para atualização -->
            <input type="hidden" th:field="*{id}"/>

            <div class="row g-3">

                <div class="col-12">
                    <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{nome}" class="form-control"
                           placeholder="Nome da receita" required/>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Tipo de Receita</label>
                    <select th:field="*{tipoReceita}" class="form-select">
                        <option value="">Selecione...</option>
                        <option value="Salgada">Salgada</option>
                        <option value="Doce">Doce</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Custo (R$)</label>
                    <input type="number" th:field="*{custo}" class="form-control"
                           step="0.01" min="0" placeholder="0,00"/>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Data de Registro</label>
                    <input type="date" th:field="*{dataRegistro}" class="form-control"/>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Status</label>
                    <select th:field="*{status}" class="form-select">
                        <option value="ATIVO">Ativo</option>
                        <option value="INATIVO">Inativo</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label fw-semibold">Descrição</label>
                    <textarea th:field="*{descricao}" class="form-control" rows="4"
                              placeholder="Ingredientes, modo de preparo…"></textarea>
                </div>

            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <a th:href="@{/receitas}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-check2-circle me-1"></i>Salvar
                </button>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
