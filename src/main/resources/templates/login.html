<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login – Receitas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f4f6f9; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="card border-0 shadow-sm p-4" style="width: 100%; max-width: 380px; border-radius: 14px;">

    <div class="text-center mb-4">
        <i class="bi bi-book-half fs-1 text-dark"></i>
        <h5 class="fw-bold mt-2 mb-0">Receitas</h5>
        <span class="text-muted small">Faça login para continuar</span>
    </div>

    <form action="/login" method="post">

        <div class="mb-3">
            <label class="form-label fw-semibold">Login</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="login" class="form-control" placeholder="Seu usuário" required/>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Senha</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="senha" class="form-control" placeholder="Sua senha" required/>
            </div>
        </div>

        <div th:if="${erro}" class="alert alert-danger py-2 small" th:text="${erro}"></div>

        <button type="submit" class="btn btn-dark w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
        </button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
