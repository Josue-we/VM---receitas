<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Receitas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f4f6f9; }
        .navbar-brand { font-weight: 700; letter-spacing: .5px; }
        .card-filter { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); border-radius: 12px; }
        .table th { background: #2c3e50; color: #fff; font-weight: 600; white-space: nowrap; }
        .badge-ativo   { background: #d1fae5; color: #065f46; }
        .badge-inativo { background: #fee2e2; color: #991b1b; }
        .btn-action { padding: 3px 9px; font-size: .8rem; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="bi bi-book-half me-2"></i>Receitas</span>
        <a th:href="@{/receitas/nova}" class="btn btn-success btn-sm">
            <i class="bi bi-plus-circle me-1"></i>Nova Receita
        </a>
    </div>
</nav>

<div class="container-fluid px-4">

    <!-- Filtros -->
    <div class="card card-filter mb-4 p-4">
        <h6 class="text-muted mb-3"><i class="bi bi-funnel me-1"></i>Filtros</h6>
        <form th:action="@{/receitas}" method="get" class="row g-3 align-items-end">

            <div class="col-md-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="">Todos</option>
                    <option value="ATIVO"   th:selected="${status == 'ATIVO'}">Ativo</option>
                    <option value="INATIVO" th:selected="${status == 'INATIVO'}">Inativo</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Data inicial</label>
                <input type="date" name="dataInicio" class="form-control"
                       th:value="${dataInicio}"/>
            </div>

            <div class="col-md-3">
                <label class="form-label">Data final</label>
                <input type="date" name="dataFim" class="form-control"
                       th:value="${dataFim}"/>
            </div>

            <div class="col-md-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-search me-1"></i>Filtrar
                </button>
                <a th:href="@{/receitas}" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-x-circle me-1"></i>Limpar
                </a>
            </div>
        </form>
    </div>

    <!-- Cabeçalho da tabela -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="text-muted small">
            <strong th:text="${total}">0</strong> registro(s) encontrado(s)
        </span>
        <!-- Exportar PDF preservando filtros atuais -->
        <a th:href="@{/receitas/pdf(status=${status}, dataInicio=${dataInicio}, dataFim=${dataFim})}"
           class="btn btn-danger btn-sm">
            <i class="bi bi-file-earmark-pdf me-1"></i>Exportar PDF
        </a>
    </div>

    <!-- Tabela -->
    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>Custo (R$)</th>
                        <th>Status</th>
                        <th>Data</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(receitas)}">
                        <td colspan="7" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-3 d-block mb-1"></i>
                            Nenhuma receita encontrada.
                        </td>
                    </tr>
                    <tr th:each="r : ${receitas}">
                        <td class="text-muted small" th:text="${r.id}"></td>
                        <td th:text="${r.nome}"></td>
                        <td th:text="${r.tipoReceita}"></td>
                        <td th:text="${#numbers.formatDecimal(r.custo, 1, 'POINT', 2, 'COMMA')}"></td>
                        <td>
                            <span class="badge rounded-pill px-3 py-1"
                                  th:classappend="${r.status == 'ATIVO'} ? 'badge-ativo' : 'badge-inativo'"
                                  th:text="${r.status}"></span>
                        </td>
                        <td th:text="${r.dataRegistro != null ? #temporals.format(r.dataRegistro,'dd/MM/yyyy') : ''}"></td>
                        <td class="text-center">
                            <a th:href="@{/receitas/editar/{id}(id=${r.id})}"
                               class="btn btn-outline-primary btn-action me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/receitas/deletar/{id}(id=${r.id})}"
                                  method="post" style="display:inline"
                                  onsubmit="return confirm('Confirma a exclusão?')">
                                <button type="submit" class="btn btn-outline-danger btn-action">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
